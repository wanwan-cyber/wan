<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>套房管理系統</title>
</head>
<body>
    <h1>套房管理系統</h1>
    <div id="data-container">正在連線資料庫...</div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwPuIcbOtyCEsccWxkQlqVnSRGDdibP7X03JaJCiqdQaFrZPq9ktoeftIY9wGzxvBurAg/exec";
        
        fetch(GAS_URL)
            .then(res => res.json())
            .then(data => {
                const container = document.getElementById('data-container');
                container.innerHTML = "<pre>" + JSON.stringify(data, null, 2) + "</pre>";
            })
            .catch(err => {
                document.getElementById('data-container').innerText = "讀取失敗，請檢查權限：" + err;
            });
    </script>
</body>
</html>
